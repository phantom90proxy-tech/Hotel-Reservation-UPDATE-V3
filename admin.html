<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>
  <link rel="icon" href="assets/logo.jpg" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <h2>Admin Dashboard (View Only)</h2>
    <div class="mb-3 text-end">
      <button class="btn btn-outline-secondary" id="logoutAdmin">Logout</button>
    </div>
    <div id="adminContent">
      <h5>Bookings</h5>
      <div class="table-responsive">
        <table class="table table-striped" id="bookingsTable">
          <thead>
            <tr><th>ID</th><th>Check-in</th><th>Check-out</th><th>Room</th><th>Guests</th><th>Promo</th><th>Add-ons</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const user = JSON.parse(localStorage.getItem('user')) || null;
    if (!user || user.role !== 'admin') {
      alert('Admin access required.');
      window.location.href = 'main.html';
      return;
    }

    function render() {
      const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
      const tbody = document.querySelector('#bookingsTable tbody');
      tbody.innerHTML = '';
      bookings.forEach(b => {
        const addons = (b.addons || []).map(a => `${a.name} x${a.qty}`).join('<br>') || '-';
        const guests = (b.adults||0) + ' adults, ' + (b.children||0) + ' children' + (b.childAges && b.childAges.length ? (' ('+b.childAges.join(', ')+ ' yrs)') : '');
        const promo = b.promo || '-';
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${b.id}</td><td>${b.checkin}</td><td>${b.checkout}</td><td>${b.roomType}</td><td>${guests}</td><td>${promo}</td><td>${addons}</td>`;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('logoutAdmin').addEventListener('click', ()=>{ localStorage.removeItem('user'); window.location.href='main.html'; });

    render();
  })();
  </script>
</body>
</html>
