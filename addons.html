<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add to Your Room</title>
  <link rel="icon" href="assets/logo.jpg" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <div class="container py-4">
    <a href="main.html" class="d-inline-block mb-3">&larr; Back</a>
    <h2 class="mb-4">Add to Your Room</h2>
    <div class="row">
      <div class="col-lg-8">
        <div class="card mb-3">
          <div class="row g-0">
            <div class="col-md-4">
              <img src="assets/addon.jpg" class="img-fluid" alt="Airport Transfer">
            </div>
            <div class="col-md-8">
              <div class="card-body">
                <h5 class="card-title">One-Way Airport Transfer</h5>
                <p class="text-muted small">Travel in style</p>
                <p>Enjoy an exceptional check-in experience with our airport transfer service. Credit card required to guarantee add-ons.</p>
                <p class="fw-bold">P2,100 <small class="text-muted">Per Room / Stay</small></p>
                <div class="mb-3">
                  <label class="form-label">Number of items</label>
                  <div class="d-flex align-items-center">
                    <button class="btn btn-outline-secondary" id="addonMinus">-</button>
                    <div class="mx-3" id="addonCount">1</div>
                    <button class="btn btn-outline-secondary" id="addonPlus">+</button>
                  </div>
                </div>
                <div class="text-end">
                  <button class="btn btn-outline-secondary me-2" id="cancelAddons">Cancel</button>
                  <button class="btn btn-primary" id="addToStay">ADD TO MY STAY</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="card p-3">
          <h6>Your Cart: <span id="cartCount">0</span> Item</h6>
          <h5 id="cartTotal">Total P0.00</h5>
          <div id="cartItems" class="mt-3"></div>
          <div class="mt-3">
            <button class="btn btn-outline-secondary w-100 mb-2" id="addRoom">ADD A ROOM</button>
            <button class="btn btn-primary w-100" id="checkout">CHECKOUT</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  // Addons page simple logic
  (function(){
    let count = 1;
    const price = 2100;
    const addonCount = document.getElementById('addonCount');
    const cartCount = document.getElementById('cartCount');
    const cartTotal = document.getElementById('cartTotal');
    const cartItems = document.getElementById('cartItems');

    function updateCartDisplay(qty){
      cartCount.textContent = qty;
      cartTotal.textContent = 'Total P' + (qty*price).toLocaleString();
      cartItems.innerHTML = '<div>'+qty+' x One-Way Airport Transfer - P'+price+'</div>';
    }

    document.getElementById('addonPlus').addEventListener('click', ()=>{ count++; addonCount.textContent = count; updateCartDisplay(count); });
    document.getElementById('addonMinus').addEventListener('click', ()=>{ if(count>1) count--; addonCount.textContent = count; updateCartDisplay(count); });

    document.getElementById('addToStay').addEventListener('click', ()=>{
      // store addon in localStorage attached to last booking
      let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
      if (!bookings.length) { alert('No booking found.'); return; }
      let last = bookings[bookings.length-1];
      last.addons = last.addons || [];
      last.addons.push({ id: Date.now(), name: 'One-Way Airport Transfer', qty: count, price: price });
      bookings[bookings.length-1] = last;
      localStorage.setItem('bookings', JSON.stringify(bookings));
      updateCartDisplay(count);
      alert('Add-on saved to your booking.');
    });

    document.getElementById('cancelAddons').addEventListener('click', ()=>{ window.location.href='index.html'; });
    document.getElementById('checkout').addEventListener('click', ()=>{ window.location.href='bookings.html'; });

    // init
    updateCartDisplay(count);
  })();
  </script>
</body>
</html>
